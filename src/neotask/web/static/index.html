<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Task Scheduler Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* 头部导航 */
        .navbar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #1e293b;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.875rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f1f5f9;
        }

        .stat-unit {
            font-size: 0.875rem;
            color: #64748b;
            margin-left: 0.25rem;
        }

        /* 图表区域 */
        .chart-container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: #94a3b8;
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 200px;
        }

        .bar {
            flex: 1;
            background: linear-gradient(180deg, #3b82f6, #60a5fa);
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease;
            min-height: 4px;
        }

        /* 任务列表 */
        .tasks-section {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 1rem;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #334155;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .refresh-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #2563eb;
            transform: scale(0.98);
        }

        .tasks-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th {
            font-weight: 500;
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-success { background: #22c55e20; color: #4ade80; }
        .status-processing { background: #3b82f620; color: #60a5fa; }
        .status-pending { background: #f59e0b20; color: #fbbf24; }
        .status-failed { background: #ef444420; color: #f87171; }

        .cancel-btn {
            background: #ef444420;
            border: 1px solid #ef4444;
            color: #f87171;
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .cancel-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 2rem;
            color: #64748b;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            th, td { padding: 0.75rem 1rem; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="navbar-content">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">Task Scheduler</div>
        </div>
        <div class="status-badge">
            <span class="status-dot"></span>
            <span>实时连接</span>
        </div>
    </div>
</div>

<div class="container">
    <!-- 统计卡片 -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-label">队列长度</div>
            <div class="stat-value" id="queueSize">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">活跃 Worker</div>
            <div class="stat-value" id="activeWorkers">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">已完成</div>
            <div class="stat-value" id="completed">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">失败数</div>
            <div class="stat-value" id="failed">--</div>
        </div>
    </div>

    <!-- 趋势图（简化版） -->
    <div class="chart-container">
        <div class="chart-title">📊 队列趋势（最近 10 次）</div>
        <div class="chart-bars" id="trendBars">
            <div class="bar" style="height: 0%"></div>
        </div>
    </div>

    <!-- 任务列表 -->
    <div class="tasks-section">
        <div class="section-header">
            <div class="section-title">📋 最近任务</div>
            <button class="refresh-btn" onclick="refreshTasks()">🔄 刷新</button>
        </div>
        <div class="tasks-table">
            <table>
                <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>状态</th>
                        <th>优先级</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="taskList">
                    <tr><td colspan="5" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // API 基础地址
    const API_BASE = window.location.origin;

    // 存储趋势数据
    let trendData = [];

    // 初始化 WebSocket 连接
    function initWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws`;
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            console.log('WebSocket 连接已建立');
            updateStatusDot(true);
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            } catch (e) {
                console.error('解析消息失败:', e);
            }
        };

        ws.onclose = () => {
            console.log('WebSocket 连接已断开，5秒后重连');
            updateStatusDot(false);
            setTimeout(initWebSocket, 5000);
        };

        ws.onerror = (error) => {
            console.error('WebSocket 错误:', error);
        };
    }

    // 更新连接状态指示器
    function updateStatusDot(connected) {
        const dot = document.querySelector('.status-dot');
        if (connected) {
            dot.style.background = '#22c55e';
            document.querySelector('.status-badge span:last-child').textContent = '实时连接';
        } else {
            dot.style.background = '#ef4444';
            document.querySelector('.status-badge span:last-child').textContent = '重连中...';
        }
    }

    // 处理 WebSocket 消息
    function handleWebSocketMessage(data) {
        switch (data.type) {
            case 'stats':
                updateStats(data.data);
                break;
            case 'task_update':
                refreshTasks();
                break;
            default:
                console.log('未知消息类型:', data.type);
        }
    }

    // 更新统计卡片
    function updateStats(stats) {
        document.getElementById('queueSize').textContent = stats.queue_size ?? '--';
        document.getElementById('activeWorkers').textContent = stats.active_workers ?? '--';
        document.getElementById('completed').textContent = stats.total_completed ?? '--';
        document.getElementById('failed').textContent = stats.total_failed ?? '--';

        // 更新趋势图
        if (stats.queue_size !== undefined) {
            trendData.push(stats.queue_size);
            if (trendData.length > 10) trendData.shift();
            updateTrendChart();
        }
    }

    // 更新趋势图
    function updateTrendChart() {
        const maxValue = Math.max(...trendData, 1);
        const barsContainer = document.getElementById('trendBars');

        barsContainer.innerHTML = trendData.map(value => {
            const height = (value / maxValue) * 180;
            return `<div class="bar" style="height: ${height}px"></div>`;
        }).join('');

        if (trendData.length === 0) {
            barsContainer.innerHTML = '<div class="bar" style="height: 0%"></div>';
        }
    }

    // 获取任务列表
    async function fetchTasks() {
        try {
            const response = await fetch(`${API_BASE}/api/tasks?limit=10`);
            if (!response.ok) throw new Error('获取任务列表失败');
            const data = await response.json();
            renderTaskList(data.tasks || []);
        } catch (error) {
            console.error('获取任务列表失败:', error);
            document.getElementById('taskList').innerHTML =
                '<tr><td colspan="5" class="loading">加载失败，请刷新重试</td></tr>';
        }
    }

    // 渲染任务列表
    function renderTaskList(tasks) {
        const tbody = document.getElementById('taskList');

        if (!tasks || tasks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="loading">暂无任务</td></tr>';
            return;
        }

        tbody.innerHTML = tasks.map(task => `
            <tr>
                <td><code style="font-size: 0.75rem;">${task.task_id?.slice(-8) || '--'}</code></td>
                <td>
                    <span class="status status-${task.status}">
                        ${getStatusIcon(task.status)} ${task.status || '--'}
                    </span>
                </td>
                <td>${getPriorityText(task.priority)}</td>
                <td>${formatTime(task.created_at)}</td>
                <td>
                    ${task.status === 'pending' || task.status === 'processing' ?
                        `<button class="cancel-btn" onclick="cancelTask('${task.task_id}')">取消</button>` :
                        '<span style="color:#64748b;">-</span>'}
                </td>
            </tr>
        `).join('');
    }

    // 获取状态图标
    function getStatusIcon(status) {
        const icons = {
            'success': '✅',
            'processing': '⚙️',
            'pending': '⏳',
            'failed': '❌',
            'cancelled': '🚫'
        };
        return icons[status] || '📌';
    }

    // 获取优先级文本
    function getPriorityText(priority) {
        const priorities = {0: 'CRITICAL', 1: 'HIGH', 2: 'NORMAL', 3: 'LOW'};
        return priorities[priority] || 'NORMAL';
    }

    // 格式化时间
    function formatTime(timestamp) {
        if (!timestamp) return '--';
        try {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('zh-CN', { hour12: false });
        } catch {
            return '--';
        }
    }

    // 取消任务
    async function cancelTask(taskId) {
        if (!confirm('确定要取消这个任务吗？')) return;

        try {
            const response = await fetch(`${API_BASE}/api/tasks/${taskId}/cancel`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                alert('任务已取消');
                refreshTasks();
            } else {
                const error = await response.json();
                alert(`取消失败: ${error.message || '未知错误'}`);
            }
        } catch (error) {
            console.error('取消任务失败:', error);
            alert('取消任务失败，请重试');
        }
    }

    // 刷新所有数据
    async function refreshTasks() {
        await fetchTasks();
        await fetchStats();
    }

    // 获取统计信息
    async function fetchStats() {
        try {
            const response = await fetch(`${API_BASE}/api/stats`);
            if (!response.ok) throw new Error('获取统计失败');
            const stats = await response.json();
            updateStats(stats);
        } catch (error) {
            console.error('获取统计失败:', error);
        }
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', () => {
        initWebSocket();
        fetchStats();
        fetchTasks();

        // 定时刷新（作为 WebSocket 的备份）
        setInterval(() => {
            fetchStats();
            fetchTasks();
        }, 30000);
    });
</script>
</body>
</html>
