[pytest]
# 异步支持
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 添加标记
markers =
    asyncio: 异步测试
    slow: 慢速测试
    integration: 集成测试
    benchmark: 性能基准测试
    chaos: 异常场景测试
    unit: 单元测试
    distributed: 分布式功能测试
    lock: 分布式锁测试
    heartbeat: 节点心跳测试
    sharding: 任务分片测试
    shard: 任务分片测试

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::RuntimeWarning

# 输出配置
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 超时设置
timeout = 300
timeout_method = thread